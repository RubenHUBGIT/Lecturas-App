<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Icono app con libro abierto, claqueta y tomate</title>
  <desc id="desc">Un icono de app en formato vectorial con un libro abierto grande, una claqueta de cine y un tomate pequeño.</desc>

  <defs>
    <linearGradient id="bg" x1="90" y1="70" x2="930" y2="950" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4C1DDB"/>
      <stop offset="0.55" stop-color="#8B1FD1"/>
      <stop offset="1" stop-color="#FF6A2B"/>
    </linearGradient>

    <linearGradient id="page" x1="190" y1="210" x2="840" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF8EC"/>
      <stop offset="1" stop-color="#F4E3C6"/>
    </linearGradient>

    <linearGradient id="cover" x1="120" y1="250" x2="900" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B3E98"/>
      <stop offset="1" stop-color="#082A6B"/>
    </linearGradient>

    <linearGradient id="tomato" x1="190" y1="670" x2="420" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF5A3A"/>
      <stop offset="1" stop-color="#DB0000"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#15062E" flood-opacity="0.25"/>
    </filter>

    <filter id="soft" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Libro grande -->
  <g filter="url(#shadow)">
    <!-- tapa/base -->
    <path d="M88 855c0-28 22-50 50-50h748c28 0 50 22 50 50 0 28-22 50-50 50H138c-28 0-50-22-50-50Z"
          fill="url(#cover)" opacity="0.96"/>
    <path d="M126 252c0-52 42-94 94-94h238c92 0 153 28 194 93v559c-44-42-101-63-170-63H220c-52 0-94-42-94-94V252Z"
          fill="url(#page)"/>
    <path d="M898 252c0-52-42-94-94-94H566c-92 0-153 28-194 93v559c44-42 101-63 170-63h262c52 0 94-42 94-94V252Z"
          fill="url(#page)"/>

    <!-- bordes/tapas azules -->
    <path d="M82 269c0-47 38-85 85-85h38v622H167c-47 0-85-38-85-85V269Z" fill="url(#cover)"/>
    <path d="M819 184h38c47 0 85 38 85 85v452c0 47-38 85-85 85h-38V184Z" fill="url(#cover)"/>

    <!-- lomo -->
    <path d="M512 238v602" stroke="#DAB98D" stroke-width="18" stroke-linecap="round"/>
    <path d="M448 846c12-33 37-55 64-55s52 22 64 55" fill="none" stroke="#0A327D" stroke-width="20" stroke-linecap="round"/>
    <ellipse cx="512" cy="849" rx="72" ry="32" fill="#082A6B"/>
  </g>

  <!-- Líneas de página -->
  <g opacity="0.42" stroke="#D8B985" stroke-width="18" stroke-linecap="round" fill="none">
    <path d="M260 332c90-18 180 0 262 52"/>
    <path d="M260 410c100-16 185 7 262 64"/>
    <path d="M260 488c90-16 176 10 262 73"/>
    <path d="M260 566c98-10 178 18 262 85"/>
    <path d="M260 644c90-8 170 14 252 78"/>

    <path d="M575 332c84-44 175-59 255-50"/>
    <path d="M575 410c85-50 171-61 255-49"/>
    <path d="M575 488c84-44 170-51 255-35"/>
    <path d="M575 566c77-33 156-35 236-20"/>
  </g>

  <!-- Claqueta grande en la página derecha -->
  <g filter="url(#soft)" transform="translate(0 6)">
    <rect x="586" y="520" width="290" height="196" rx="34" fill="#1F2340"/>
    <rect x="586" y="442" width="290" height="76" rx="26" fill="#202748"/>
    <path d="M604 456h54l56 48h-54l-56-48Zm111 0h54l56 48h-54l-56-48Zm111 0h32c10 0 18 8 18 18v14l-19 16h-51l-56-48Z"
          fill="#F6F2EA"/>
    <path d="M636 490h54l-16 14h-54l16-14Zm111 0h54l-16 14h-54l16-14Z"
          fill="#CFC9C2" opacity="0.45"/>
    <circle cx="623" cy="505" r="16" fill="#E7E2DA"/>
    <path d="M707 568l93 55c14 8 14 28 0 36l-93 55c-14 8-31-2-31-18V586c0-16 17-26 31-18Z" fill="#FFFFFF"/>
  </g>

  <!-- Tomate pequeño -->
  <g filter="url(#soft)">
    <circle cx="272" cy="754" r="112" fill="url(#tomato)"/>
    <circle cx="230" cy="718" r="28" fill="#FFFFFF" opacity="0.26"/>
    <path d="M271 653c22-26 53-36 82-30-18 12-28 30-30 50-18-9-34-15-52-20Z" fill="#3FAE1F"/>
    <path d="M268 653c-21-26-53-36-82-30 18 12 28 30 30 50 18-9 34-15 52-20Z" fill="#46BE20"/>
    <path d="M271 653c-2 16 0 30 6 46" stroke="#226A11" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M271 653c14-18 38-25 63-19-19 7-34 21-43 40-6-9-13-15-20-21Z" fill="#54C925"/>
    <path d="M271 653c-14-18-38-25-63-19 19 7 34 21 43 40 6-9 13-15 20-21Z" fill="#54C925"/>
  </g>
</svg>
